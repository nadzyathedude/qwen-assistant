# /etc/nginx/sites-available/qwen-server

upstream qwen_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # TLS — use certbot/Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Streaming support — critical: disable all buffering
    proxy_buffering off;
    proxy_cache off;

    # Timeouts aligned with inference timeout
    proxy_connect_timeout 10s;
    proxy_read_timeout    180s;
    proxy_send_timeout    180s;

    # Max request body (prompt can be large with history)
    client_max_body_size 2m;

    location / {
        proxy_pass http://qwen_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE support
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        # Disable nginx response buffering for streaming
        proxy_set_header X-Accel-Buffering no;
    }

    location /health {
        proxy_pass http://qwen_backend/health;
        access_log off;
    }
}
